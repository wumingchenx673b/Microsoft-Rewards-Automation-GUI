name: Microsoft Rewards Automation

on:
  schedule:
    # 每天北京时间早上 08:30 自动运行
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动点击按钮触发运行

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-cursor0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
          libxcb-render-util0 libxcb-shape0 libxcb-xkb1 libxcb-xfixes0 \
          libxcb-util1 libgl1 libegl1 libdbus-1-3

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 playwright
        playwright install chromium
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script with Virtual Display
      env:
        MS_USER: ${{ secrets.MS_USER }}
        MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
      run: |
        # 1. 动态生成符合项目需求的 API.json 配置文件
        echo "{\"username\": \"$MS_USER\", \"password\": \"$MS_PASSWORD\"}" > API.json

        # 2. 异步管道：先输入 1 登录，睡 30 秒等自动填密完成，再敲回车保存
        echo "=== 步骤 1：启动云端浏览器，尝试自动填密登录并等待 30 秒 ==="
        (echo "1"; sleep 30; echo "") | xvfb-run --server-args="-screen 0 1280x1024x24" python main.py || true

        # 3. 检查当前目录下到底有没有顺利生成 cookie 文件
        echo "=== 步骤 2：检查云端 Cookie 是否成功保存 ==="
        if [ -d "Assets/cookies" ]; then
          echo "🎉 极好！检测到 Cookie 文件夹已生成："
          ls -R Assets/cookies
        else
          echo "⚠️ 警告：未检测到 Cookie 文件夹，可能是微软触发了图形验证码拦截。"
        fi

        # 4. 重点修复：用 printf 连续喂入 "2" (选开始任务) 和 "1" (选择 未知账户)
        echo "=== 步骤 3：尝试执行每日积分任务 ==="
        printf "2\n1\n" | xvfb-run --server-args="-screen 0 1280x1024x24" python main.py
