name: Microsoft Rewards Automation

on:
  schedule:
    # 每天北京时间早上 08:30 自动运行
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动点击按钮触发运行

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        # 适配最新版 Ubuntu 24.04 系统的标准现代图形库全家桶
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-cursor0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
          libxcb-render-util0 libxcb-shape0 libxcb-xkb1 libxcb-xfixes0 \
          libxcb-util1 libgl1 libegl1 libdbus-1-3

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # 只安装运行所需的库，不走编译弯路
        pip install PyQt6 playwright
        playwright install chromium
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script with Virtual Display
      env:
        MS_USER: ${{ secrets.MS_USER }}
        MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
      run: |
        # 1. 动态生成符合项目需求的 API.json 配置文件
        echo "{\"username\": \"$MS_USER\", \"password\": \"$MS_PASSWORD\"}" > API.json

        # 2. 复制出两个临时的脚本分身，分别强制注入选项 1 和选项 2
        cp main.py login_and_save.py
        cp main.py run_tasks.py
        
        sed -i 's/choice = input/choice = "1" #/g' login_and_save.py
        sed -i 's/choice = input/choice = "2" #/g' run_tasks.py

        # 3. 连招第一式：先自动跑选项 1 登录并保存 Cookie
        echo "=== 步骤 1：正在尝试自动登录并生成 Cookie 缓存 ==="
        xvfb-run --server-args="-screen 0 1280x1024x24" python login_and_save.py

        # 4. 连招第二式：紧接着跑选项 2 挺进每日任务
        echo "=== 步骤 2：检测到 Cookie 已生成，开始刷每日积分 ==="
        xvfb-run --server-args="-screen 0 1280x1024x24" python run_tasks.py
