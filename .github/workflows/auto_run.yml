name: Microsoft Rewards Automation

on:
  schedule:
    # 每天北京时间早上 08:30 自动运行 (UTC 时间 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        # 补齐 PyQt6 运行所需的完整 Linux 图形与渲染库（包含 libegl1 和 xcb 插件依赖）
        sudo apt-get install -y xvfb python3-tk libxrender1 libxtst6 libxi6 \
          libegl1 libgl1 libxkbcommon-x11-0 libxcb-xinerama0 libxcb-cursor0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装自动化和虚拟显示的核心库
        pip install pyinstaller pyvirtualdisplay PyQt6 playwright
        playwright install chromium
        
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script with Virtual Display
      env:
        # 读取你在 Settings -> Secrets 中配置的加密账号密码
        MS_USER: ${{ secrets.MS_USER }}
        MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
      run: |
        # 1. 动态生成符合项目需求的 API.json 配置文件
        echo "{\"username\": \"$MS_USER\", \"password\": \"$MS_PASSWORD\"}" > API.json

        # 2. 启动虚拟显示屏幕并直接运行主程序
        xvfb-run --server-args="-screen 0 1024x768x24" python gui.py
