name: Microsoft Rewards Automation

on:
  schedule:
    # 每天北京时间早上 08:30 自动运行 (UTC 时间 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        # 适配 Ubuntu 24.04 的新版图形底层库，用 libgl1x-mesa 代替旧包
        sudo apt-get install -y xvfb python3-tk libxrender1 libxtst6 libxi6 libgl1-mesa-dri libglx-mesa0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装自动化和虚拟显示的核心库
        pip install pyinstaller pyvirtualdisplay PyQt6 playwright
        playwright install chromium
        
        # 切换到真正的代码子目录下安装依赖
        cd Microsoft-Rewards-Automation-GUI
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script with Virtual Display
      env:
        # 读取你在 Settings -> Secrets 中配置的加密账号密码
        MS_USER: ${{ secrets.MS_USER }}
        MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
      run: |
        # 1. 切换到核心代码目录
        cd Microsoft-Rewards-Automation-GUI
        
        # 2. 动态生成符合项目需求的 API.json 配置文件
        echo "{\"username\": \"$MS_USER\", \"password\": \"$MS_PASSWORD\"}" > API.json

        # 3. 启动虚拟显示屏幕并直接运行主程序
        # 注意：这里我们使用核心目录下的 gui.py 作为启动入口
        xvfb-run --server-args="-screen 0 1024x768x24" python gui.py
