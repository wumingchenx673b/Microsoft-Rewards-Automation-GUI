name: Microsoft Rewards Automation

on:
  schedule:
    # 每天北京时间早上 08:30 自动运行 (UTC 时间 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许你手动点击按钮触发运行

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb python3-tk libxrender1 libxtst6 libxi6

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyvirtualdisplay

    - name: Run script with Virtual Display
      run: |
        # 尝试在云端虚拟显示器下运行该项目
        xvfb-run --server-args="-screen 0 1024x768x24" python *.py
