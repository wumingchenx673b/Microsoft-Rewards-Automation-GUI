name: Microsoft Rewards Automation

on:
  schedule:
    # 每天北京时间早上 08:30 自动运行
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动点击按钮触发运行

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-cursor0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
          libxcb-render-util0 libxcb-shape0 libxcb-xkb1 libxcb-xfixes0 \
          libxcb-util1 libgl1 libegl1 libdbus-1-3

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 playwright
        playwright install chromium
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script with Virtual Display
      env:
        MS_USER: ${{ secrets.MS_USER }}
        MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
        MS_COOKIE: ${{ secrets.MS_COOKIE }} # 引入你刚在本地抓好的 Cookie
      run: |
        # 1. 动态生成符合项目需求的 API.json 配置文件
        echo "{\"username\": \"$MS_USER\", \"password\": \"$MS_PASSWORD\"}" > API.json

        # 2. 创建 cookies 专属目录，并将密文还原为本地文件
        mkdir -p Assets/cookies
        # 【注意】请查看你在本地生成的 json 文件名叫什么（比如叫 cookies.json 或你的账号名.json）
        # 将下面这一行的 "auth_cookies.json" 替换为与你本地一模一样的文件名
        echo "$MS_COOKIE" > Assets/cookies/auth_cookies.json

        # 3. 既然有了 Cookie，直接模拟键盘输入 "2" 挺进每日任务
        echo "=== 检测到本地 Cookie 已成功注入，开始刷每日积分 ==="
        echo "2" | xvfb-run --server-args="-screen 0 1280x1024x24" python main.py
