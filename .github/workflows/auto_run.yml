name: Microsoft Rewards Automation

on:
  schedule:
    # 每天北京时间早上 08:30 自动运行 (对应 UTC 时间 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动点击按钮触发运行

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        # 保持完整的底层图形支持全家桶
        sudo apt-get install -y xvfb python3-tk libxrender1 libxtst6 libxi6 \
          libegl1 libgl1 libxkbcommon-x11-0 libxcb-xinerama0 libxcb-cursor0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
          libxcb-render-util0 libxcb-xkb1 libxcb-shape0 libxcb-util1 \
          libfontconfig1 libdbus-1-3 libgl1-mesa-dri libglx-mesa0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装核心自动化和浏览器控制依赖
        pip install pyinstaller pyvirtualdisplay PyQt6 playwright
        playwright install chromium
        
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script with Virtual Display
      env:
        # 安全读取你在 Settings -> Secrets 中配置的加密账号密码
        MS_USER: ${{ secrets.MS_USER }}
        MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
      run: |
        # 1. 动态生成符合项目需求的 API.json 配置文件
        echo "{\"username\": \"$MS_USER\", \"password\": \"$MS_PASSWORD\"}" > API.json

        # 2. 【核心修复】自动把源码里的手动输入菜单，强制默认改成选择“2”（使用并开始每日任务）
        # 这样程序在云端运行时就不会因为死等人类敲键盘而崩溃
        sed -i 's/choice = input/choice = "2" #/g' main.py

        # 3. 启动虚拟显示屏幕并直接运行主程序
        xvfb-run --server-args="-screen 0 1024x768x24" python main.py
